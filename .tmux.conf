# ==========================
# 基础设置
# ==========================

# 1. 开启鼠标支持 (重要)
set -g mouse on

# 2. 修改前缀键 (Prefix)
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# 3. 重新加载配置文件的快捷键
bind r source-file ~/.tmux.conf \; display "配置文件已重新加载！"

# ==========================
# 窗口与窗格 (Window & Pane)
# ==========================

# 4. 更直观的分屏快捷键
# 默认的 " 和 % 很难记。
# 使用 | 进行垂直分屏 (看起来像竖线)
# 使用 - 进行水平分屏 (看起来像横线)
# 并且，新窗格默认进入当前目录 (默认会回到 Home 目录)
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"

# 5. 使用 Vim 风格的按键在窗格间移动
# "前缀键 + h/j/k/l" 切换焦点，无需使用方向键
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 6. 调整窗格大小 (Vim 风格)
# "前缀键 + H/J/K/L" (大写) 调整大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 7. 窗口/面板索引从 1 开始
# 默认从 0 开始，但 0 在键盘最右边，按起来不方便。
set -g base-index 1
setw -g pane-base-index 1

# 8. 自动重新编号窗口
# 当关闭中间的窗口时 (比如关闭了 2 号，剩 1 和 3)，自动重新排序为 1, 2
set -g renumber-windows on

# ==========================
# 显示与体验
# ==========================

# 9. 开启 256 色支持 (避免 vim 在 tmux 里颜色变得奇怪)
set -g default-terminal "screen-256color"

# 10. 增加历史回滚行数 (默认只有几千行，往往不够用)
set -g history-limit 10000

# 11. 消除 vim 按键延迟
# 在 tmux 中按 Esc 键有时会有延迟，这行配置可以解决
set -s escape-time 0

# ==========================
# 复制模式 (Copy Mode)
# ==========================

# 12. 使用 Vi 风格的按键模式进行复制粘贴
setw -g mode-keys vi

# 绑定 'v' 开始选择 (像 Vim 的 visual mode)
bind -T copy-mode-vi v send -X begin-selection
# 绑定 'y' 复制 (像 Vim 的 yank)
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ==========================================
# 状态栏设计 (经典绿色 + 功能增强)
# ==========================================

# 1. 全局样式：回归经典的“黑字绿底”
# 这种配色在任何亮色或暗色终端主题下对比度都很高，不会看不清
set -g status-style bg=green,fg=black

# 2. 左侧：[前缀提示] + [会话名]
set -g status-left-length 40
# 逻辑：如果按下前缀键(Ctrl+a)，显示白底黑字的 [WAIT]，否则只显示会话名
# #[default] 的作用是重置回绿底黑字
set -g status-left " #{?client_prefix,#[bg=white] WAIT #[default] ,}[#S] "

# 3. 右侧：[复制模式提示] + 时间
set -g status-right-length 60
# 逻辑：如果进入复制模式，显示黄底黑字的 [COPY]
set -g status-right " #{?pane_in_mode,#[bg=yellow] COPY #[default] ,} %H:%M | %Y-%m-%d "

# 4. 窗口列表 (中间部分)
# 默认窗口：只显示序号和名字 (比如 1:zsh)
setw -g window-status-format " #I:#W "

# 激活窗口：加粗，并加上 * 号，不用花哨的背景色，保持经典感
# 如果你觉得不够明显，可以把下面这就话里的 'bold' 改成 'reverse' (反转颜色)
setw -g window-status-current-style reverse
setw -g window-status-current-format " #I:#W* "

# 5. 状态栏位置
set -g status-position top

# 6. 分割线颜色 (为了配合绿色主题，分割线用同样的绿色，看起来更一体)
set -g pane-active-border-style fg=green
set -g pane-border-style fg=green
